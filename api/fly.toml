app = "basket-trials-api"
primary_region = "sin"

[env]
  PORT = "8080"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "15s"
